name: "CodeQL Advanced"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '30 4 * * 1' # Runs at 04:30 every Monday

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Setup environment for Java/Kotlin (Android) analysis
    - name: Set up JDK 21
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    # Setup Python for Python analysis
    - name: Set up Python
      if: matrix.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # Setup Node.js (needed for JavaScript/TypeScript and Gradle/Capacitor integration)
    - name: Set up Node.js
      if: matrix.language == 'javascript-typescript' || matrix.language == 'java-kotlin'
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # Initialize CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # Manual build step for Java/Kotlin to resolve Gradle dependencies
    - name: Build Android Project
      if: matrix.language == 'java-kotlin'
      run: |
        cd frontend
        npm install --legacy-peer-deps
        mkdir -p dist
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon -x lint -Dorg.gradle.java.home=$JAVA_HOME

    # Install Python dependencies for Python analysis
    - name: Install Python Dependencies
      if: matrix.language == 'python'
      run: |
        python -m pip install --upgrade pip
        pip install -r banking_backend/requirements.txt

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
