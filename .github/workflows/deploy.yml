name: Production Deployment
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
 
jobs:
  # =============================================================================
  # FINAL SMOKE PASS: Ensure last-minute integrity before triggering Render
  # =============================================================================
  pre-deploy-check:
    name: Pre-Deploy Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
 
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
 
    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r banking_backend/requirements.txt
 
    - name: Run Backend Logic Check
      # NO continue-on-error here. If tests fail, deployment stops.
      run: |
        cd banking_backend
        python manage.py test --verbosity=2 --keepdb
      env:
        SECRET_KEY: deploy-check-key-2026
        DATABASE_URL: sqlite:///db.sqlite3
        DEBUG: 'true'
        FIELD_ENCRYPTION_KEY: YB3LYgcKXzEo3uF66yteVshsZ7JZPR07LKwlkuNAv9Q=
        PII_HASH_KEY: deploy-check-pii-hash-key-64chars-long-enough-v1
 
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
 
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps
 
    - name: Verify Frontend Buildable
      run: |
        cd frontend
        npm run build
 
  # =============================================================================
  # DEPLOY TRIGGER: Send Signal to Render
  # =============================================================================
  deploy:
    name: Trigger Render Deploy
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
    - name: Trigger Deploy Hook
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deployment triggered successfully."
        else
          echo "ERROR: RENDER_DEPLOY_HOOK_URL secret not set. Deployment cannot proceed."
          exit 1
        fi
