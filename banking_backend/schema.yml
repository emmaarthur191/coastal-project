components:
  schemas:
    Account:
      type: object
      description: Serializer for existing banking accounts.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        account_number:
          type: string
          readOnly: true
        account_type:
          $ref: '#/components/schemas/AccountAccountTypeEnum'
        account_type_display:
          type: string
          readOnly: true
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        calculated_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        is_active:
          type: boolean
        customer_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_number
      - account_type_display
      - balance
      - calculated_balance
      - created_at
      - customer_name
      - id
      - updated_at
      - user
    AccountAccountTypeEnum:
      enum:
      - daily_susu
      - member_savings
      - youth_savings
      - shares
      type: string
      description: |-
        * `daily_susu` - Daily Savings
        * `member_savings` - Member Savings
        * `youth_savings` - Youth Savings
        * `shares` - Shares
    AccountClosureRequest:
      type: object
      description: Serializer for account closure requests.
      properties:
        id:
          type: integer
          readOnly: true
        account:
          type: integer
          readOnly: true
        account_id:
          type: integer
          writeOnly: true
        account_number:
          type: string
          readOnly: true
        customer_name:
          type: string
          readOnly: true
        closure_reason:
          $ref: '#/components/schemas/ClosureReasonEnum'
        other_reason:
          type: string
        phone_number:
          type: string
          readOnly: true
        otp_verified:
          type: boolean
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE5aEnum'
          readOnly: true
        processed_by:
          type: integer
          readOnly: true
          nullable: true
        submitted_by:
          type: integer
          readOnly: true
          nullable: true
        rejection_reason:
          type: string
          readOnly: true
        notes:
          type: string
          readOnly: true
        final_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        closed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - account
      - account_id
      - account_number
      - closed_at
      - closure_reason
      - created_at
      - customer_name
      - final_balance
      - id
      - notes
      - phone_number
      - processed_by
      - rejection_reason
      - status
      - submitted_by
      - updated_at
    AccountOpeningRequest:
      type: object
      description: Serializer for account opening requests.
      properties:
        id:
          type: integer
          readOnly: true
        existing_member:
          type: integer
          nullable: true
        account_type:
          $ref: '#/components/schemas/AccountOpeningRequestAccountTypeEnum'
        card_type:
          $ref: '#/components/schemas/CardTypeEnum'
        id_type:
          type: string
        id_number:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          readOnly: true
        address:
          type: string
          readOnly: true
        phone_number:
          type: string
        email:
          type: string
          format: email
        occupation:
          type: string
          readOnly: true
        work_address:
          type: string
          readOnly: true
        position:
          type: string
          readOnly: true
        digital_address:
          type: string
          readOnly: true
        location:
          type: string
          readOnly: true
        next_of_kin_data:
          type: string
          readOnly: true
        photo:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE5aEnum'
          readOnly: true
        full_name:
          type: string
          readOnly: true
        processed_by:
          type: integer
          readOnly: true
          nullable: true
        submitted_by:
          type: integer
          readOnly: true
          nullable: true
        created_account:
          type: integer
          readOnly: true
          nullable: true
        credentials_approved_by:
          type: integer
          readOnly: true
          nullable: true
          description: Manager who approved the dispatch of login credentials
        credentials_sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        rejection_reason:
          type: string
          readOnly: true
        notes:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        approved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
